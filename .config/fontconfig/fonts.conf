<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>
 <match>
  <test compare="contains" name="prgname">
   <string>nw</string>
   <!-- Matches the WeChat Developer Tool executable -->
  </test>
  <edit mode="prepend" name="family">
   <!-- don't comment on the first line of the file, it will make config unusable -->
   <!-- this config is for wechat developer tool. It has problem in showing Chinese characters correctly -->
   <!-- other fonts seems not work only msyh or pingfang in mac -->
   <string>Microsoft YaHei</string>
  </edit>
 </match>
<match target="pattern">
    <test name="family"><string>Symbol</string></test>
    <edit name="family" mode="assign" binding="same">
      <string>Standard Symbols PS</string>
    </edit>
  </match>
 <dir>~/.local/share/fonts</dir>
</fontconfig>
